version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: gobouncer-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  gobouncer:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gobouncer-app
    ports:
      - "8080:8080"
    environment:
      - REDIS_ADDR=redis:6379
      - PORT=8080
      - POLICY_FILE=config/policies.example.json
      - FAIL_OPEN=true
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  redis_data:
